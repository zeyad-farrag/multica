# Reverse proxy for team.multica.uittai.com.
# Story 1.1 AC4 / Task 4.4. Routing rules are order-sensitive — most-specific
# locations come before the catch-all. SSE has its own block to disable
# response buffering.

server {
    listen 80;
    server_name team.multica.uittai.com;

    # TODO: production cert — terminate TLS at :443 with Let's Encrypt and
    # forward HTTP→HTTPS here (AR7). Left as TODO for the deploy story.
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/team.multica.uittai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/team.multica.uittai.com/privkey.pem;

    # SSE — long-lived. Must be matched BEFORE the generic /api/ block.
    location ~ ^/api/v1/orgs/.+/events$ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Inbound from the Multica fork — Multica calls /gates/issue-update via
    # TEAM_APP_URL. This is the only path Multica is allowed to hit.
    location /gates/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all → Next.js.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
