# TIM-6 sqlc config for team-app standalone-app schema (mirror + domain tables).
# UUID columns map to github.com/google/uuid.UUID; JSONB columns map to []byte (the
# pgx/v5 default — no override needed). The schema input is the migrations directory;
# sqlc applies *.down.sql then *.up.sql in lex order to derive the final schema.
version: "2"
sql:
  - engine: "postgresql"
    queries: "pkg/db/queries"
    schema: "migrations"
    gen:
      go:
        package: "generated"
        out: "pkg/db/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
